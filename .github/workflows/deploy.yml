name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  deploy-staging:
    needs: validate
    if: >
      github.ref_type == 'branch' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__STAGING_DATABASE_ID__|$D1_STAGING_DATABASE_ID|g" wrangler.toml
          sed -i "s|__INTEGRATION_TEST_SECRET__|$INTEGRATION_TEST_SECRET|g" wrangler.toml
          sed -i "s|__ALLOWED_ORIGINS__|$ALLOWED_ORIGINS|g" wrangler.toml
        env:
          D1_STAGING_DATABASE_ID: ${{ secrets.D1_STAGING_DATABASE_ID }}
          INTEGRATION_TEST_SECRET: ${{ secrets.INTEGRATION_TEST_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy to staging
        run: npm run deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-production:
    needs: validate
    if: >
      github.ref_type == 'tag' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__PRODUCTION_DATABASE_ID__|$D1_PRODUCTION_DATABASE_ID|g" wrangler.toml
          sed -i "s|__ALLOWED_ORIGINS__|$ALLOWED_ORIGINS|g" wrangler.toml
        env:
          D1_PRODUCTION_DATABASE_ID: ${{ secrets.D1_PRODUCTION_DATABASE_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy to production
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
