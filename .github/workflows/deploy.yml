name: Deploy

run-name: "Deploy: ${{ github.event.inputs.environment == 'production' && github.ref_name || github.event.inputs.commit_message || github.event.inputs.sha || 'manual' }}"

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message or tag for workflow name display"
        required: false
        type: string
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      sha:
        description: "Short commit SHA for display"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.event.inputs.environment == 'staging'
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__STAGING_DATABASE_ID__|$D1_STAGING_DATABASE_ID|g" wrangler.toml
          sed -i "s|__INTEGRATION_TEST_SECRET__|$INTEGRATION_TEST_SECRET|g" wrangler.toml
          sed -i "s|__ALLOWED_ORIGINS__|$ALLOWED_ORIGINS|g" wrangler.toml
        env:
          D1_STAGING_DATABASE_ID: ${{ secrets.D1_STAGING_DATABASE_ID }}
          INTEGRATION_TEST_SECRET: ${{ secrets.INTEGRATION_TEST_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy to staging
        run: npm run deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-production:
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__PRODUCTION_DATABASE_ID__|$D1_PRODUCTION_DATABASE_ID|g" wrangler.toml
          sed -i "s|__ALLOWED_ORIGINS__|$ALLOWED_ORIGINS|g" wrangler.toml
        env:
          D1_PRODUCTION_DATABASE_ID: ${{ secrets.D1_PRODUCTION_DATABASE_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy to production
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Trigger Release
        run: |
          gh workflow run release.yml \
            -f tag="${{ github.ref_name }}" \
            --ref "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-tests:
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-24.04
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "url=https://simplelikes.william-brendaw.workers.dev" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "url=https://simplelikes-staging.william-brendaw.workers.dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        run: npm run test:integration
        env:
          INTEGRATION_TEST_SECRET: ${{ secrets.INTEGRATION_TEST_SECRET }}
          INTEGRATION_TEST_URL: ${{ steps.env.outputs.url }}
          EXPECTED_ORIGIN: ${{ secrets.ALLOWED_ORIGINS }}

