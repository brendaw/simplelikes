name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  deploy-staging:
    needs: build
    if: >
      (github.event_name == 'push' && github.ref_type == 'branch') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__STAGING_DATABASE_ID__|$D1_STAGING_DATABASE_ID|g" wrangler.toml
          sed -i "s|__INTEGRATION_TEST_SECRET__|$INTEGRATION_TEST_SECRET|g" wrangler.toml
          sed -i "s|__ALLOWED_ORIGINS__|$ALLOWED_ORIGINS|g" wrangler.toml
        env:
          D1_STAGING_DATABASE_ID: ${{ secrets.D1_STAGING_DATABASE_ID }}
          INTEGRATION_TEST_SECRET: ${{ secrets.INTEGRATION_TEST_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy to staging
        run: npm run deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-production:
    needs: build
    if: >
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s|__PRODUCTION_DATABASE_ID__|$D1_PRODUCTION_DATABASE_ID|g" wrangler.toml
          sed -i "s|__ALLOWED_ORIGINS__|$ALLOWED_ORIGINS|g" wrangler.toml
        env:
          D1_PRODUCTION_DATABASE_ID: ${{ secrets.D1_PRODUCTION_DATABASE_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy to production
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  integration-tests:
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-24.04
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Determine environment
        id: env
        run: |
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "url=https://simplelikes.william-brendaw.workers.dev" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "url=https://simplelikes-staging.william-brendaw.workers.dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        run: npm run test:integration
        env:
          INTEGRATION_TEST_SECRET: ${{ secrets.INTEGRATION_TEST_SECRET }}
          INTEGRATION_TEST_URL: ${{ steps.env.outputs.url }}

  trigger-release:
    needs: integration-tests
    if: success() && needs.integration-tests.outputs.environment == 'production' && github.ref_type == 'tag'
    permissions:
      actions: write
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Release Workflow
        run: |
          gh workflow run release.yml \
            -f tag=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
