name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

run-name: "Release ${{ inputs.tag || 'manual' }}"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build client bundle
        run: npm run build:client

      - name: Get tag
        id: tag
        run: |
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          awk -v tag="${TAG#v}" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > _release_notes.md
          if [ ! -s _release_notes.md ]; then
            echo "No CHANGELOG entry found for ${TAG}"
            echo "" > _release_notes.md
          fi

      - name: Build distribution archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DIST="dist/simplelikes-${TAG}"
          mkdir -p "${DIST}/src" "${DIST}/examples" "${DIST}/scripts"
          cp -r src/ "${DIST}/src/"
          cp -r examples/ "${DIST}/examples/"
          cp dist/simple-likes.js "${DIST}/"
          cp package.json "${DIST}/"
          cp tsconfig.json "${DIST}/"
          cp wrangler.toml.example "${DIST}/"
          cp LICENSE "${DIST}/"
          cp README.md "${DIST}/"
          [ -f scripts/setup.sh ] && cp scripts/setup.sh "${DIST}/scripts/"
          [ -f package-lock.json ] && cp package-lock.json "${DIST}/"
          [ -f .env.example ] && cp .env.example "${DIST}/"
          cd dist
          zip -r "simplelikes-${TAG}.zip" "simplelikes-${TAG}/"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body_path: _release_notes.md
          files: dist/simplelikes-${{ steps.changelog.outputs.tag }}.zip
          generate_release_notes: false
