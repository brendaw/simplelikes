name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

run-name: "Release ${{ inputs.tag || 'manual' }}"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build client bundle
        run: npm run build:client

      - name: Get tag
        id: tag
        run: |
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          awk -v tag="${TAG#v}" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > _release_notes.md
          if [ ! -s _release_notes.md ]; then
            echo "No CHANGELOG entry found for ${TAG}"
            echo "" > _release_notes.md
          fi

      - name: Build distribution archives
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Client archive (frontend-only)
          CLIENT_DIR="dist/simplelikes-client-${TAG}"
          mkdir -p "${CLIENT_DIR}"
          cp dist/simple-likes.js "${CLIENT_DIR}/"
          cp dist/simple-likes.min.js "${CLIENT_DIR}/"
          cd dist
          zip -r "simplelikes-client-${TAG}.zip" "simplelikes-client-${TAG}/"

          # API archive (self-host)
          API_DIR="dist/simplelikes-api-${TAG}"
          mkdir -p "${API_DIR}/scripts"
          cp dist/simple-likes.js "${API_DIR}/"
          cp -r src/ "${API_DIR}/src/"
          cp -r examples/ "${API_DIR}/examples/"
          cp package.json "${API_DIR}/"
          cp package-lock.json "${API_DIR}/"
          cp tsconfig.json "${API_DIR}/"
          cp wrangler.toml.example "${API_DIR}/"
          cp .env.example "${API_DIR}/"
          cp LICENSE "${API_DIR}/"
          cp README.md "${API_DIR}/"
          [ -f scripts/setup.sh ] && cp scripts/setup.sh "${API_DIR}/scripts/"
          zip -r "simplelikes-api-${TAG}.zip" "simplelikes-api-${TAG}/"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body_path: _release_notes.md
          files: |
            dist/simplelikes-client-${{ steps.changelog.outputs.tag }}.zip
            dist/simplelikes-api-${{ steps.changelog.outputs.tag }}.zip
            dist/simple-likes.js
          generate_release_notes: false
