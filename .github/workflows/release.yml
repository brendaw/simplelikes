name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Parse CHANGELOG section for this tag
          awk -v tag="${TAG#v}" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > _release_notes.md

          if [ ! -s _release_notes.md ]; then
            echo "No CHANGELOG entry found for ${TAG}"
            echo "" > _release_notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body_path: _release_notes.md
          generate_release_notes: false
