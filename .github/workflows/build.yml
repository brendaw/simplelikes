name: Build

run-name: "Build: ${{ github.event_name == 'push' && github.event.head_commit.message || github.ref_name }}"

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip-typecheck:
        description: "Skip typecheck stage"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    if: ${{ !inputs.skip-typecheck }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

  unit-tests:
    needs: typecheck
    if: always() && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  trigger-deploy:
    needs: unit-tests
    if: github.event_name == 'push' && success()
    permissions:
      actions: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Deploy
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          gh workflow run deploy.yml \
            -f environment=${{ steps.env.outputs.environment }} \
            -f sha="$SHA_SHORT" \
            --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
