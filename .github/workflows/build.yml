name: Build

run-name: "${{ github.ref_type == 'tag' && github.ref_name || github.event.head_commit.message || github.ref_name || 'manual' }}"

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip-typecheck:
        description: "Skip typecheck stage"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    if: ${{ !inputs.skip-typecheck && !(github.event_name == 'push' && github.ref_type == 'branch' && startsWith(github.event.head_commit.message, 'chore: release v')) }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

  unit-tests:
    needs: typecheck
    if: ${{ !(github.event_name == 'push' && github.ref_type == 'branch' && startsWith(github.event.head_commit.message, 'chore: release v')) && always() && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  trigger-deploy:
    needs: unit-tests
    if: ${{ !(github.event_name == 'push' && github.ref_type == 'branch' && startsWith(github.event.head_commit.message, 'chore: release v')) && github.event_name == 'push' && success() }}
    permissions:
      actions: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Get display message
        id: msg
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value<<EOF" >> "$GITHUB_OUTPUT"
            git log --format=%s -1 "${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Deploy
        run: |
          gh workflow run deploy.yml \
            -f environment=${{ steps.env.outputs.environment }} \
            -f commit_message="${{ steps.msg.outputs.value }}" \
            --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
