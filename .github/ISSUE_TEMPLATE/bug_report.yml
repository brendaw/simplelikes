name: Bug Report
description: Reportar um problema com a API
labels: [bug]
body:
  - type: input
    id: api-version
    attributes:
      label: Versão da API (tag)
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: O que aconteceu?
      description: Descrição clara do bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Fazer requisição para '...'
        2. Com payload '....'
        3. Erro retornado
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes (opcional)
      description: Output do `wrangler dev` ou resposta HTTP
      render: shell
